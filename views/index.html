<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Niche Cafes</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css" rel="stylesheet">
</head>
<body>

    <!-- Independent Floating Action Link (Styled like a button) -->
    <a href="login.html" class="fixed-login-btn">
        <i class='bx bx-user-circle'></i>
        <span>Log In</span>
    </a>

    <aside class="sidebar">
        <div class="sidebar-header">
        </div>
        <ul class="nav-links">
            <li><a href="#" class="active"><i class='bx bx-home-alt-2'></i> <span></span></a></li>
            <li><a href="#"><i class="bx bx-book-add"></i> <span></span></a></li>
            <!-- <li><a href="#"><i class='bx bx-chat'></i> <span>Profile</span></a></li> -->
            <!-- <li><a href="#"><i class='bx bx-list-ul'></i><span></span></a></li> -->
        </ul>
        
    </aside>

    <main class="main-content">
        <!-- Add the login button with a Boxicon user icon -->
    
        <div class="landing">
            <!-- Add the login button with a Boxicon user icon -->
            
            <header class="top-header">
                <h1>Niche Cafes</h1>
            </header>

            <div class="controls">
                <label for="distance">Distance:</label>
                <select id="distance">
                    <option value="5">Less than 5 Miles</option>
                    <option value="10">10 Miles</option>
                    <option value="20">20 Miles</option>
                </select>

                <label for="city">City:</label>
                <select id="city">
                    <option value="riverside">Riverside</option>
                    <option value="los-angeles">Los Angeles</option>
                    <option value="san-bernardino">San Bernardino</option>
                </select>

                <button id="fetchBtn">Search</button>
            </div> 
        </div>

        <div id="cafesContainer"></div>

        <!-- <section class="content-body">
            <h3>Recommended Cafes</h3><br/>
            <div class="card">
                <p>This is your main content area. It is styled to automatically push to the right of the sidebar on desktop screens.</p>
            </div>
        </section> -->

        
    </main>

    <script>
        // A single collection where each item knows its own city and distance mapping
        const ALL_CAFES = [
            {
                title: "The Arcade Coffee Roasters",
                city: "riverside",
                distance: 5, // 5 miles away
                published_date: "2026-07-15",
                abstract: "A trendy warehouse space in Riverside serving exceptional specialty coffee less than 5 miles from downtown.",
                media: [{ "media-metadata": [{ url: "https://images.unsplash.com/photo-1501339847302-ac426a4a7cbb?w=400" }] }]
            },
            {
                title: "Condron Coffee",
                city: "riverside",
                distance: 10, // 10 miles away
                published_date: "2026-07-12",
                abstract: "A sleek, minimalist quiet study-friendly environment located about 10 miles out.",
                media: []
            },
            {
                title: "Bear & Kono's Coffee Shop",
                city: "san-bernadino",
                distance: 10,
                published_date: "2026-02-16",
                abstract: "An ultra-minimalist Arts District favorite specializing in meticulously sourced beans.",
                media: [{ "media-metadata": [{ url: "https://images.unsplash.com/photo-1554118811-1e0d58224f24?w=400" }] }]
            },
            {
                title: "Maru Coffee",
                city: "los-angeles",
                distance: 5,
                published_date: "2026-07-16",
                abstract: "An ultra-minimalist Arts District favorite specializing in meticulously sourced beans.",
                media: [{ "media-metadata": [{ url: "https://images.unsplash.com/photo-1554118811-1e0d58224f24?w=400" }] }]
            },
            {
                title: "Sightglass Coffee",
                city: "los-angeles",
                distance: 20,
                published_date: "2026-07-02",
                abstract: "A beautiful multi-story roastery located roughly 20 miles out in the greater LA area.",
                media: []
            }
        ];

        // 2. Reusable rendering engine (Takes an array and paints the cards)
        function renderCafes(cafesToDisplay) {
            const container = document.getElementById('cafesContainer'); 
            
            // container.innerHTML = ''; // Clear previous cards or messages
            // Inject new HTML immediately before that target element opens
            container.insertAdjacentHTML('beforebegin', '<div class="alert-banner"> <h3>Reccomended Cafes</h3></div>');

            // Fallback check if no items fit the filter rules
            if (cafesToDisplay.length === 0) { 
                container.innerHTML = '<p style="color: #666; padding: 20px;">No cafes found matching those specific criteria. Try expanding your parameters!</p>';
                return;
            }

            // Generate and append cards dynamically
            cafesToDisplay.forEach((cafe) => {
                const cafeDiv = document.createElement('div');
                cafeDiv.className = 'card cafe-card'; 
                cafeDiv.style.marginBottom = "20px";

                let imageUrl = cafe.media && cafe.media.length > 0
                    ? cafe.media[0]['media-metadata'][0].url
                    : 'https://images.unsplash.com/photo-1495474472287-4d71bcdd2085?w=400';

                // Clean, parameterized layout presentation string
                cafeDiv.innerHTML = `
                    <h3>${cafe.title}</h3>
                    <p style="font-size: 0.85rem; color: #777; margin-bottom: 8px;">
                        <strong>Location:</strong> ${cafe.city.replace('-', ' ')} | <strong>Distance:</strong> ${cafe.distance} miles away
                    </p>
                    <p style="margin-bottom: 12px;">${cafe.abstract}</p>
                    <img src="${imageUrl}" width="150px" style="border-radius: 4px; object-fit: cover; height: 100px;" alt="Cafe Image">
                `;

                container.appendChild(cafeDiv);
            });
        }
        // 3. Filter control workflow (triggered on button click)
        function handleSearch() {
            const selectedDistance = parseInt(document.getElementById('distance').value);
            const selectedCity = document.getElementById('city').value;

            // Apply our criteria constraints to our data array
            const filteredList = ALL_CAFES.filter(cafe => {
                const matchesCity = cafe.city === selectedCity;
                const matchesDistance = cafe.distance <= selectedDistance;
                return matchesCity && matchesDistance;
            });

            // Pass the subset list over to our layout engine
            renderCafes(filteredList);
        }

        // --- LIFE CYCLE ACTIVATION LISTENERS ---

        // Initial default run: Executed immediately when DOM loads
        document.addEventListener('DOMContentLoaded', () => {
            renderCafes(ALL_CAFES); // Display all baseline options by default
        });

        // Filtering handler hook
        document.getElementById('fetchBtn').addEventListener('click', handleSearch);

        // Simulate a logged-in session profile state tracking variable
        const currentLoggedInUser = {
            username: "coffee_lover_99",
            email: "user@example.com",
            roleId: "user" // Try changing this string to "owner" to test your layout buttons!
        };
        function checkPagePermissions(user) {
            // Target any administrative markup element you want to restrict (like an Add Cafe button)
            const addCafeButton = document.getElementById('addCafeBtn'); 

            if (addCafeButton) { // Safety check to make sure the button exists in HTML
                if (user.roleId === 'owner') {
                    addCafeButton.style.display = 'block'; // Show management tools
                    console.log("Welcome back, Captain. Owner tools unlocked.");
                } else {
                    addCafeButton.style.display = 'none';  // Hide management features from users
                    console.log("Standard profile loaded. Management tools hidden.");
                }
            }
        }

        // --- LIFE CYCLE ACTIVATION LISTENERS ---
        document.addEventListener('DOMContentLoaded', () => {
            renderCafes(ALL_CAFES);       // 1. Load baseline cafe cards
            
            checkPagePermissions(currentLoggedInUser); // 2. Instant security sweep on window load
        });

    </script>
</body>
</html>
