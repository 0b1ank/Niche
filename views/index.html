<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple Sidebar Template</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css" rel="stylesheet">
</head>
<body>

    <aside class="sidebar">
        <div class="sidebar-header">
            <h2>Niche</h2>
        </div>
        <ul class="nav-links">
            <li><a href="#" class="active"><i class='bx bx-grid-alt'></i> <span>Home</span></a></li>
            <li><a href="#"><i class='bx bx-user'></i> <span>Create</span></a></li>
            <li><a href="#"><i class='bx bx-chat'></i> <span>Profile</span></a></li>
            <li><a href="#"><i class='bx bx-cog'></i> <span>Feed</span></a></li>
        </ul>
        <div class="sidebar-footer">
            <a href="#"><i class='bx bx-log-out'></i> <span>Logout</span></a>
        </div>
    </aside>

    <main class="main-content">
        <header class="top-header">
            <h1>Niche</h1>
        </header>
        <section class="content-body">
            <div class="card">
                <h3>Main Section</h3>
                <p>This is your main content area. It is styled to automatically push to the right of the sidebar on desktop screens.</p>
            </div>
        </section>
    </main>

</body>
</html>
